  - name: Secure Instant Point-to-Point Messaging
    type: Academic/Group
    organization: University of Oklahoma (CS5173 Computer Security)
    start: Spring 2026
    end: May 2026
    description: |
      Two-party secure chat application with authenticated key agreement, AES-GCM messaging,
      per-message nonces, and HKDF key rotation. Desktop GUI shows ciphertext and plaintext
      side by side. Built with teammates Johnpaul Nguyen and Jacob Woolbright.
    role: Team member
    technologies: [Python, AES-GCM, ECDH, Ed25519, HKDF, Tkinter, CustomTkinter, sockets, cryptography]
    features:
      - Authenticated key agreement via ephemeral ECDH (P-384) and Ed25519 identity signatures
      - 256-bit AES-GCM session keys derived with HKDF-SHA-256 (bonus: no pre-shared passphrase)
      - Per-message 12-byte random nonces for distinct ciphertext on repeated plaintexts
      - HKDF ratchet key rotation every five messages for partial forward secrecy
      - Three-layer architecture: crypto/socket, controller, and Tkinter GUI
      - GUI message bubbles displaying both ciphertext and plaintext
      - Automated loopback integration tests for delivery and key rotation
    impact:
      - Satisfied all assignment requirements plus authenticated ECDH key agreement bonus
      - Provides confidentiality, integrity, authenticity, and ciphertext non-determinism
      - Session-level forward secrecy at handshake; bounded exposure via key ratchet
    limitations:
      - Trust-on-first-use (identity keys not persisted or fingerprinted)
      - Metadata (IPs, timing, approximate lengths) not obfuscated
    notes:
      - Report: Computer_Security_report-2.pdf
      - Public repository link to be added if/when published
